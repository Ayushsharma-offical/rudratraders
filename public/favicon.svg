<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f1a0f"/>
  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#d4af37" stroke-width="2.5"/>
  <!-- Bold "R" letter in gold -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    fill="#d4af37"
    letter-spacing="-1"
  >R</text>
  <!-- Small "T" subscript -->
  <text
    x="50%"
    y="80%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-weight="400"
    fill="#a08020"
    letter-spacing="3"
  >TRADERS</text>
</svg>